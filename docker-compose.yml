services:
  skintokens:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${SKINTOKENS_BASE_IMAGE:-base-cuda:cu128-torch2.7.1}
    image: skintokens:cu128-torch2.7.1
    container_name: skintokens
    runtime: nvidia
    environment:
      TZ: Asia/Shanghai
      NVIDIA_VISIBLE_DEVICES: all
      SKINTOKENS_MODEL_ROOT: /models/SkinTokens
      SKINTOKENS_EXPERIMENTS_DIR: /models/SkinTokens/experiments
      SKINTOKENS_DATA_ROOT: /workspace/SkinTokens
      SKINTOKENS_DEVICE: cuda
      SKINTOKENS_HOST: 0.0.0.0
      SKINTOKENS_PORT: 8000
      HF_HOME: /cache/huggingface
      TORCH_HOME: /cache/torch
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      LIBGL_ALWAYS_SOFTWARE: "1"
    volumes:
      - .:/workspace/SkinTokens
      - models:/models:ro
      - hf_cache:/cache/huggingface
      - torch_cache:/cache/torch
    working_dir: /workspace/SkinTokens
    ports:
      - "8087:8000"
    shm_size: 8gb
    command: ["python", "serve.py"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf_cache:
  torch_cache:
  models:
    name: models
    external: true
